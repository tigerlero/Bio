<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bio Explorer 3D — An interactive 3D portfolio game built with Three.js" />
  <meta property="og:title" content="Bio Explorer 3D" />
  <meta property="og:description" content="Explore Panagiotis Efstathiadis's portfolio in 3D" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Bio Explorer 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1a0a; }
    canvas { display: block; }
    #ui-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      font-family: monospace;
    }
    #interact-prompt {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 14px; text-shadow: 0 0 8px #000;
      background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 4px;
      display: none;
    }
    #zone-label {
      position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
      color: #fff; font-size: 32px; font-weight: bold; text-shadow: 0 0 12px #000;
      pointer-events: none; opacity: 0; transition: opacity 0.5s;
    }
    #dialogue-box {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 80%; max-width: 600px; background: rgba(0,0,0,0.85); border: 1px solid #446644;
      border-radius: 8px; padding: 16px 20px; color: #fff; font-size: 15px;
      display: none; pointer-events: auto;
    }
    #dialogue-name { color: #44ff88; font-weight: bold; margin-bottom: 4px; }
    #dialogue-text { line-height: 1.5; min-height: 1.5em; }
    #modal-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.7);
      display: none; pointer-events: auto;
    }
    #modal-content {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      max-width: 500px; max-height: 70vh; overflow-y: auto;
      background: #1a2a1a; border: 1px solid #44aa66; border-radius: 12px;
      padding: 24px; color: #ddd; font-size: 14px; line-height: 1.6; white-space: pre-wrap;
    }
    #modal-close {
      position: absolute; top: 8px; right: 12px;
      color: #888; font-size: 24px; cursor: pointer; pointer-events: auto;
    }
    #modal-close:hover { color: #fff; }
    #fade-overlay {
      position: fixed; inset: 0; background: #000; z-index: 999;
      pointer-events: none; opacity: 0;
    }
    #pause-menu {
      position: absolute; inset: 0; background: rgba(0,0,0,0.75);
      display: none; pointer-events: auto;
    }
    #pause-content {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center;
    }
    #pause-title { font-size: 36px; color: #fff; margin-bottom: 24px; }
    .pause-btn {
      display: block; width: 240px; margin: 8px auto; padding: 10px 0;
      background: #2a3a2a; border: 1px solid #446644; border-radius: 6px;
      color: #aaa; font-size: 18px; cursor: pointer; font-family: monospace;
      pointer-events: auto;
    }
    .pause-btn:hover { background: #3a4a3a; color: #fff; }
    .pause-btn.selected { color: #fff; border-color: #66cc66; }
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a1a0a; color: #44ff88; font-family: monospace;
    }
    #loading-screen h1 { font-size: 28px; margin-bottom: 12px; }
    #loading-screen p { font-size: 14px; color: #88ffbb; }
    .spinner {
      width: 30px; height: 30px; border: 3px solid #1a3a1a;
      border-top-color: #44ff88; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script defer crossorigin src="./assets/index-B_gn_BEd.js"></script>
</head>
<body>
  <div id="game"></div>
  <div id="loading-screen">
    <div class="spinner"></div>
    <h1>✦ Bio Explorer 3D</h1>
    <p>Loading the world...</p>
  </div>
  <div id="ui-overlay">
    <div id="zone-label"></div>
    <div id="interact-prompt"></div>
    <div id="dialogue-box">
      <div id="dialogue-name"></div>
      <div id="dialogue-text"></div>
    </div>
    <div id="modal-overlay">
      <div id="modal-content">
        <span id="modal-close">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>
    <div id="pause-menu">
      <div id="pause-content">
        <div id="pause-title">PAUSED</div>
      </div>
    </div>
  </div>
  <div id="fade-overlay"></div>
</body>
</html>
