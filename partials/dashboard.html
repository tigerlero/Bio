<section id="dashboard">
  <div class="section-inner">
    <div class="section-header reveal">
      <span class="section-tag">// activity</span>
      <h2 class="section-title">GitHub <span>Dashboard</span></h2>
      <div class="section-line"></div>
    </div>
    <div class="dashboard-grid">
      <div class="dashboard-card reveal">
        <div class="dashboard-card-header">
          <i class="fas fa-calendar-alt"></i>
          <span>Contribution Calendar</span>
        </div>
        <div class="contribution-calendar" id="contribution-calendar">
          <div class="calendar-loading"><i class="fas fa-spinner fa-spin"></i> Loading contribution data...</div>
        </div>
      </div>
      <div class="dashboard-card reveal">
        <div class="dashboard-card-header">
          <i class="fas fa-history"></i>
          <span>Recent Activity</span>
        </div>
        <div class="diary-list" id="diary-list">
          <div class="diary-loading"><i class="fas fa-spinner fa-spin"></i> Loading recent activity...</div>
        </div>
      </div>
    </div>
  </div>
</section>
